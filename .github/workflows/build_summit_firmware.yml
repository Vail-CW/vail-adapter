name: Build and Deploy Summit Firmware

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch in Vail-CW/vail-summit to build from'
        required: true
        default: 'main'
        type: string
      deploy_target:
        description: 'Where to deploy the built firmware'
        required: true
        default: 'test'
        type: choice
        options:
          - test    # → docs/firmware_files/test/summit/  (beta channel on live site)
          - stable  # → docs/firmware_files/summit/       (production)
          - none    # → build only, artifacts only, no commit

# Pinned to match the local C:\acli build environment documented in the
# vail-summit project guidelines. Update versions here AND in the local
# arduino-cli/user/libraries/ so CI and local stay in sync.
env:
  ESP32_CORE_VERSION: "2.0.14"
  LIB_LOVYANGFX: "1.1.16"
  LIB_LVGL: "8.3.11"
  LIB_ADAFRUIT_LC709203F: "1.3.4"
  LIB_ADAFRUIT_BUSIO: "1.17.4"
  LIB_ADAFRUIT_MAX1704X: "1.0.3"
  LIB_ARDUINOJSON: "7.0.4"
  LIB_WEBSOCKETS: "2.4.1"
  LIB_ESPASYNCWEBSERVER: "3.6.0"
  LIB_ASYNCTCP: "3.3.2"
  LIB_NIMBLE_ARDUINO: "1.4.2"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout vail-summit source branch
        uses: actions/checkout@v4
        with:
          repository: Vail-CW/vail-summit
          ref: ${{ inputs.source_branch }}
          fetch-depth: 1
          path: vail-summit

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform (pinned)
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${ESP32_CORE_VERSION}

      - name: Install pinned libraries
        run: |
          arduino-cli lib install "LovyanGFX@${LIB_LOVYANGFX}"
          arduino-cli lib install "lvgl@${LIB_LVGL}"
          arduino-cli lib install "Adafruit LC709203F@${LIB_ADAFRUIT_LC709203F}"
          arduino-cli lib install "Adafruit BusIO@${LIB_ADAFRUIT_BUSIO}"
          arduino-cli lib install "Adafruit MAX1704X@${LIB_ADAFRUIT_MAX1704X}"
          arduino-cli lib install "ArduinoJson@${LIB_ARDUINOJSON}"
          arduino-cli lib install "WebSockets@${LIB_WEBSOCKETS}"
          arduino-cli lib install "ESP Async WebServer@${LIB_ESPASYNCWEBSERVER}"
          arduino-cli lib install "Async TCP@${LIB_ASYNCTCP}"
          arduino-cli lib install "NimBLE-Arduino@${LIB_NIMBLE_ARDUINO}"

          echo "Installed libraries:"
          arduino-cli lib list

      - name: Place lv_conf.h next to lvgl library
        # vail-summit ships its lv_conf.h at the repo root. LVGL's
        # lv_conf_internal.h expects it at "../../lv_conf.h" relative to
        # src/misc/ — i.e. one level above the lvgl/ library folder. Local
        # builds put it in arduino-cli/user/libraries/lv_conf.h. Mirror that
        # by copying the source-controlled copy into ~/Arduino/libraries/.
        run: |
          if [ ! -f vail-summit/lv_conf.h ]; then
            echo "ERROR: vail-summit/lv_conf.h not found in source checkout"
            exit 1
          fi
          cp vail-summit/lv_conf.h ~/Arduino/libraries/lv_conf.h
          echo "Placed lv_conf.h at: $(ls -l ~/Arduino/libraries/lv_conf.h)"

      - name: Build firmware
        working-directory: vail-summit
        run: |
          # -mtext-section-literals is required for sketches that produce a
          # .text section large enough to overrun the l32r literal-pool range
          # (~32KB). The ESP32-S3 variant of the platform.txt sets this flag
          # for compiler.cpp.flags.esp32s3, but on a fresh CI install the s3
          # variant isn't always picked up — adding it explicitly via
          # --build-property guarantees the sketch gets it. ArduinoJson 7.0.4
          # in particular pushes us over the boundary without it.
          arduino-cli compile \
            --fqbn "esp32:esp32:adafruit_feather_esp32s3:CDCOnBoot=cdc,PartitionScheme=huge_app,PSRAM=enabled,FlashSize=4M,USBMode=hwcdc" \
            --build-property "compiler.cpp.extra_flags=-mtext-section-literals" \
            --output-dir build \
            --export-binaries \
            --clean \
            .

          echo "Built files:"
          ls -lh build

      - name: Normalize binary filenames
        working-directory: vail-summit/build
        run: |
          # arduino-cli emits files prefixed with "<sketch>.ino." — rename to
          # the names the updater serves. Three explicit renames (a generic
          # for-loop with parameter expansion would map vail-summit.ino.bin
          # to "bin" instead of "vail-summit.bin").
          [ -f vail-summit.ino.bootloader.bin ] && mv vail-summit.ino.bootloader.bin bootloader.bin
          [ -f vail-summit.ino.partitions.bin ] && mv vail-summit.ino.partitions.bin partitions.bin
          [ -f vail-summit.ino.bin ]            && mv vail-summit.ino.bin            vail-summit.bin
          [ -f vail-summit.ino.merged.bin ]     && mv vail-summit.ino.merged.bin     merged.bin || true
          echo "Final files:"
          ls -lh

      - name: Capture firmware version + source commit
        id: ver
        working-directory: vail-summit
        run: |
          VER=$(grep -E '^#define[[:space:]]+FIRMWARE_VERSION' src/core/config.h | sed -E 's/.*"([^"]+)".*/\1/')
          DATE=$(grep -E '^#define[[:space:]]+FIRMWARE_DATE' src/core/config.h | sed -E 's/.*"([^"]+)".*/\1/')
          # Capture the actual checked-out vail-summit SHA. github.sha refers
          # to the workflow repo (vail-adapter), which is misleading in
          # BUILD_INFO since the firmware is built from vail-summit source.
          SOURCE_SHA=$(git rev-parse HEAD)
          echo "version=${VER:-unknown}" >> $GITHUB_OUTPUT
          echo "date=${DATE:-unknown}" >> $GITHUB_OUTPUT
          echo "source_sha=${SOURCE_SHA}" >> $GITHUB_OUTPUT
          echo "Firmware version: $VER ($DATE)"
          echo "Source commit (vail-summit): $SOURCE_SHA"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: summit-firmware-${{ steps.ver.outputs.version }}-${{ github.sha }}
          path: |
            vail-summit/build/bootloader.bin
            vail-summit/build/partitions.bin
            vail-summit/build/vail-summit.bin
          retention-days: 30

      - name: Determine deploy target directory
        id: target
        if: ${{ inputs.deploy_target != 'none' }}
        run: |
          case "${{ inputs.deploy_target }}" in
            stable)
              TARGET_DIR="firmware_files/summit"
              COMMIT_MSG="Update Summit firmware to v${{ steps.ver.outputs.version }} (from ${{ inputs.source_branch }})"
              ;;
            test)
              TARGET_DIR="firmware_files/test/summit"
              COMMIT_MSG="chore: update TEST Summit firmware from ${{ inputs.source_branch }} (v${{ steps.ver.outputs.version }})"
              ;;
          esac
          echo "dir=$TARGET_DIR" >> $GITHUB_OUTPUT
          echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "Target: docs/$TARGET_DIR"

      - name: Stash build outputs outside the workspace before deploy checkout
        # actions/checkout (run again below for vail-adapter) reliably wipes
        # GITHUB_WORKSPACE even with clean: false in some scenarios. Move the
        # built binaries to /tmp where neither checkout will touch them.
        if: ${{ inputs.deploy_target != 'none' }}
        run: |
          mkdir -p /tmp/summit-build
          cp vail-summit/build/bootloader.bin   /tmp/summit-build/
          cp vail-summit/build/partitions.bin   /tmp/summit-build/
          cp vail-summit/build/vail-summit.bin  /tmp/summit-build/
          ls -lh /tmp/summit-build/

      - name: Checkout vail-adapter master for deploy
        if: ${{ inputs.deploy_target != 'none' }}
        uses: actions/checkout@v4
        with:
          repository: Vail-CW/vail-adapter
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vail-adapter
          clean: false

      - name: Copy firmware files into vail-adapter
        if: ${{ inputs.deploy_target != 'none' }}
        run: |
          DEST="vail-adapter/docs/${{ steps.target.outputs.dir }}"
          mkdir -p "$DEST"
          cp /tmp/summit-build/bootloader.bin   "$DEST/"
          cp /tmp/summit-build/partitions.bin   "$DEST/"
          cp /tmp/summit-build/vail-summit.bin  "$DEST/"

          # Provenance for testers
          cat > "$DEST/BUILD_INFO.txt" <<EOF
          Vail Summit firmware
          Version:        ${{ steps.ver.outputs.version }}
          Firmware date:  ${{ steps.ver.outputs.date }}
          Built from:     Vail-CW/vail-summit @ ${{ inputs.source_branch }}
          Source commit:  ${{ steps.ver.outputs.source_sha }}
          Workflow:       Vail-CW/vail-adapter @ ${{ github.sha }}
          Deploy target:  ${{ steps.target.outputs.dir }}
          Built at:       $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          echo "Files in $DEST:"
          ls -lh "$DEST"

      - name: Commit and push to vail-adapter
        if: ${{ inputs.deploy_target != 'none' }}
        working-directory: vail-adapter
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add docs/${{ steps.target.outputs.dir }}/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "${{ steps.target.outputs.msg }} [skip ci]"
            git push origin master
          fi
