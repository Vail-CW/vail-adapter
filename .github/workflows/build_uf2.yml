name: Build and Deploy Arduino UF2 Firmware

on:
  push:
    branches:
      - master # Primary development branch
    paths:
      # Only trigger when source code or config changes
      - '**.ino'           # Arduino sketch files
      - '**.cpp'           # C++ source files
      - '**.h'             # Header files
      - 'config.h'         # Hardware configuration
      - '.github/workflows/build_uf2.yml'  # This workflow itself
  release:
    types: [published] # Triggers when you publish a new release
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Where to deploy the built firmware'
        required: true
        default: 'test'
        type: choice
        options:
          - test    # → docs/firmware_files/test/ (beta channel on live site)
          - stable  # → docs/firmware_files/ (production; same as master push)
          - none    # → build only, artifacts only, no commit

jobs:
  build_firmware: # This remains mostly the same
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- XIAO SAMD21 Configurations ---
          - board_name: "XIAO_SAMD21"
            fqbn: "Seeeduino:samd:seeed_XIAO_m0"
            hw_define: "V1_Basic_PCB"
            uf2_name: "xiao_basic_pcb_v1.uf2"
          - board_name: "XIAO_SAMD21"
            fqbn: "Seeeduino:samd:seeed_XIAO_m0"
            hw_define: "V2_Basic_PCB"
            uf2_name: "xiao_basic_pcb_v2.uf2"
          - board_name: "XIAO_SAMD21"
            fqbn: "Seeeduino:samd:seeed_XIAO_m0"
            hw_define: "NO_PCB_GITHUB_SPECS"
            uf2_name: "xiao_non_pcb.uf2"
          - board_name: "XIAO_SAMD21"
            fqbn: "Seeeduino:samd:seeed_XIAO_m0"
            hw_define: "Advanced_PCB"
            uf2_name: "xiao_advanced_pcb.uf2"
          # --- Adafruit QT Py SAMD21 Configurations ---
          - board_name: "QTPY_SAMD21"
            fqbn: "adafruit:samd:adafruit_qtpy_m0"
            hw_define: "V1_Basic_PCB"
            uf2_name: "qtpy_basic_pcb_v1.uf2"
          - board_name: "QTPY_SAMD21"
            fqbn: "adafruit:samd:adafruit_qtpy_m0"
            hw_define: "V2_Basic_PCB"
            uf2_name: "qtpy_basic_pcb_v2.uf2"
          - board_name: "QTPY_SAMD21"
            fqbn: "adafruit:samd:adafruit_qtpy_m0"
            hw_define: "Advanced_PCB"
            uf2_name: "qtpy_advanced_pcb.uf2"
          - board_name: "QTPY_SAMD21"
            fqbn: "adafruit:samd:adafruit_qtpy_m0"
            hw_define: "NO_PCB_GITHUB_SPECS"
            uf2_name: "qtpy_non_pcb.uf2"
          # --- Adafruit TRRS Trinkey SAMD21 Configuration ---
          - board_name: "TRRS_TRINKEY"
            fqbn: "adafruit:samd:adafruit_TRRStrinkey_m0"
            hw_define: "TRRS_TRINKEY"
            uf2_name: "trinkey_vail_adapter.uf2"
          # --- Arduino Micro (ATmega32U4) — produces .hex, not .uf2 ---
          - board_name: "ARDUINO_MICRO"
            fqbn: "arduino:avr:micro"
            hw_define: "ARDUINO_MICRO_BOARD"
            uf2_name: "arduino_micro.hex"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Configure Arduino CLI and Install Cores & Libraries
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core update-index
          arduino-cli core install Seeeduino:samd
          arduino-cli core install adafruit:samd
          arduino-cli core install arduino:avr
          arduino-cli lib update-index
          arduino-cli lib install MIDIUSB
          arduino-cli lib install "Adafruit FreeTouch Library"
          arduino-cli lib install FlashStorage_SAMD
          arduino-cli lib install Keyboard
      - name: Set Hardware Define in Header
        env:
          CONFIG_FILE: "config.h"
          CONFIG_DEFINE: ${{ matrix.hw_define }}
          DEFINES_LIST: "V1_Basic_PCB V2_Basic_PCB Advanced_PCB NO_PCB_GITHUB_SPECS TRRS_TRINKEY ARDUINO_MICRO_BOARD"
        run: |
          echo "Setting Hardware Define to: ${CONFIG_DEFINE} in ${CONFIG_FILE}"
          if [ ! -f "$CONFIG_FILE" ]; then echo "Error: $CONFIG_FILE not found!"; exit 1; fi
          for DEF in $DEFINES_LIST; do sed -i -E "s|^(\s*#define\s+${DEF})|//#define ${DEF}|" $CONFIG_FILE; done
          sed -i -E "s|^(\s*//\s*#define\s+${CONFIG_DEFINE})|#define ${CONFIG_DEFINE}|" $CONFIG_FILE
      - name: Compile Sketch
        env: { SKETCH_DIR: "." }
        run: arduino-cli compile --fqbn ${{ matrix.fqbn }} --output-dir build_output --export-binaries $SKETCH_DIR
      - name: Find or Clone uf2conv.py
        if: ${{ !endsWith(matrix.uf2_name, '.hex') }}
        id: find_uf2conv
        run: |
          UF2_CONV_PATH=$(find $HOME/.arduino15/packages/ -name "uf2conv.py" | head -n 1)
          if [ -z "$UF2_CONV_PATH" ]; then
            echo "Cloning Microsoft UF2 repo..."
            git clone https://github.com/microsoft/uf2.git
            if [ -f "uf2/utils/uf2conv.py" ]; then UF2_CONV_PATH="uf2/utils/uf2conv.py"; else echo "Failed to find uf2conv.py."; exit 1; fi
          fi
          echo "UF2_CONV=$UF2_CONV_PATH" >> $GITHUB_ENV
      - name: Convert to UF2 (SAMD21 only)
        if: ${{ !endsWith(matrix.uf2_name, '.hex') }}
        env: { UF2_FAMILY_ID: "0x68ED2B88", UF2_BASE_ADDR: "0x2000" }
        run: |
          BIN_FILE=$(find build_output -name "*.bin" | head -n 1)
          if [ -z "$BIN_FILE" ]; then echo "Error: No .bin file found!"; exit 1; fi
          python3 ${{ env.UF2_CONV }} -c -f ${{ env.UF2_FAMILY_ID }} -b ${{ env.UF2_BASE_ADDR }} "$BIN_FILE" -o "${{ matrix.uf2_name }}"
      - name: Copy HEX file (AVR only)
        if: ${{ endsWith(matrix.uf2_name, '.hex') }}
        run: |
          HEX_FILE=$(find build_output -name "*.hex" | grep -v with_bootloader | head -n 1)
          if [ -z "$HEX_FILE" ]; then echo "Error: No .hex file found!"; exit 1; fi
          cp "$HEX_FILE" "${{ matrix.uf2_name }}"
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.uf2_name }}
          path: ${{ matrix.uf2_name }}

  deploy:
    needs: build_firmware # Runs only after all build_firmware jobs succeed
    # Skip deploy entirely when user explicitly asked for build-only
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'none' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow writing to repository
    steps:
      - name: Determine deploy target directory
        id: target
        run: |
          # Default for push / release events: stable
          TARGET_DIR="firmware_files"
          COMMIT_MSG="Update firmware files (UF2 + HEX)"
          SKIP="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.deploy_target }}" in
              stable)
                TARGET_DIR="firmware_files"
                COMMIT_MSG="Update firmware files (manual dispatch from ${{ github.ref_name }})"
                ;;
              test)
                TARGET_DIR="firmware_files/test"
                COMMIT_MSG="chore: update TEST firmware from ${{ github.ref_name }} @ ${{ github.sha }}"
                ;;
            esac
          fi
          # A pre-release must never overwrite the stable live-site firmware.
          # Its build is published as release assets only (see attach_release_assets).
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            SKIP="true"
            echo "Pre-release: skipping stable firmware_files/ deploy (assets only)."
          fi
          echo "dir=$TARGET_DIR" >> $GITHUB_OUTPUT
          echo "msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "skip=$SKIP" >> $GITHUB_OUTPUT
          echo "Target directory: docs/$TARGET_DIR (skip=$SKIP)"

      # Always commit to master, regardless of the source branch. A test
      # deploy from a feature branch still updates live-site assets only.
      - name: Checkout master
        if: ${{ steps.target.outputs.skip != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all firmware artifacts
        if: ${{ steps.target.outputs.skip != 'true' }}
        uses: actions/download-artifact@v4
        with:
          path: all_uf2_files

      - name: List downloaded files
        if: ${{ steps.target.outputs.skip != 'true' }}
        run: |
          echo "Listing downloaded artifacts:"
          ls -R all_uf2_files

      - name: Copy firmware files to docs/${{ steps.target.outputs.dir }}
        if: ${{ steps.target.outputs.skip != 'true' }}
        run: |
          DEST="docs/${{ steps.target.outputs.dir }}"
          echo "Copying firmware files to $DEST..."
          mkdir -p "$DEST"
          find all_uf2_files -name "*.uf2" -exec cp {} "$DEST/" \;
          find all_uf2_files -name "*.hex" -exec cp {} "$DEST/" \;
          # Record build provenance so testers know what they're flashing
          cat > "$DEST/BUILD_INFO.txt" <<EOF
          Built from:   ${{ github.ref_name }}
          Commit:       ${{ github.sha }}
          Event:        ${{ github.event_name }}
          Deploy target: ${{ steps.target.outputs.dir }}
          Built at:     $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          echo "Files in $DEST:"
          ls "$DEST"

      - name: Commit and Push updated firmware files
        if: ${{ steps.target.outputs.skip != 'true' }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add docs/${{ steps.target.outputs.dir }}/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "${{ steps.target.outputs.msg }}"
            git push origin master
          fi

  # On any published release (stable or pre-release), attach the built firmware
  # as version-stamped assets so the updater can offer per-version downloads.
  attach_release_assets:
    needs: build_firmware
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_fw

      - name: Version-stamp and upload assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -e
          mkdir -p release_assets
          # Artifacts download into per-name subdirs; flatten and stamp the tag
          # into each filename, e.g. xiao_basic_pcb_v2.uf2 -> xiao_basic_pcb_v2_v5.0.uf2
          find all_fw -type f \( -name "*.uf2" -o -name "*.hex" \) | while read -r f; do
            base="$(basename "$f")"
            name="${base%.*}"
            ext="${base##*.}"
            cp "$f" "release_assets/${name}_${TAG}.${ext}"
          done
          echo "Assets to upload to $TAG:"
          ls -1 release_assets
          gh release upload "$TAG" release_assets/* --clobber --repo "$GITHUB_REPOSITORY"
